<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="carvix-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#2F80ED" />
      <stop offset="100%" stopColor="#B026FF" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Deep Black Background with Rounded Corners -->
  <rect width="64" height="64" rx="14" fill="#0B0E11" />
  
  <!-- Aerodynamic 'C' Shape -->
  <path 
    d="M 48 16 L 28 16 A 16 16 0 0 0 12 32 A 16 16 0 0 0 28 48 L 48 48 L 38 38 L 28 38 A 6 6 0 0 1 22 32 A 6 6 0 0 1 28 26 L 38 26 Z" 
    fill="url(#carvix-grad)" 
  />
  
  <!-- AI Circuit Node -->
  <circle 
    cx="40" 
    cy="32" 
    r="4" 
    fill="#FFFFFF" 
    filter="url(#glow)" 
  />
</svg>
