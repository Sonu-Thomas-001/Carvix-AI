    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://carvix.ai/#organization",
          "name": "Carvix AI",
          "url": "https://carvix.ai/",
          "logo": "https://carvix.ai/logo.png",

            "https://twitter.com/carvixai",
            "https://linkedin.com/company/carvixai"
          ]

        {
          "@type": "WebSite",

          "name": "Carvix AI",
          "description": "AI-Powered 3D Car Customizer & Configurator",
          "publisher": {
            "@id": "https://carvix.ai/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://carvix.ai/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "SoftwareApplication",

          "applicationCategory": "DesignApplication",
          "offers": {

          }
        }
      ]
    }
